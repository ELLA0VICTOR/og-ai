services:
  - type: web
    name: og-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OG_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OG_MODEL
        value: GEMINI_2_5_FLASH
      - key: TOP_K_CHUNKS
        value: "5"
