services:
  - type: web
    name: og-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: OG_PRIVATE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: OG_MODEL
        value: google/gemini-2.5-flash
      - key: OG_SETTLEMENT_MODE
        value: BATCH_HASHED
      - key: TOP_K_CHUNKS
        value: "5"
